networks:
  my-network: {}
volumes:
  mysql:
services:
    mysql:
       image: mysql:1.0.0
       networks:
         - my-network
       volumes:
            - mysql:/var/lib/mysql

    backend:
     image: backend:1.0.0
     networks:
       - my-network
     container_name: backend
     depends_on:
       - mysql

    frontend:
      image: frontend:1.0.0
      networks:
        - my-network
      container_name: frontend
      ports:
        - "80:80"
      depends_on:
        - backend